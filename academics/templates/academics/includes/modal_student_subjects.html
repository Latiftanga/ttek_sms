{% load core_tags %}

<div class="flex items-center justify-between mb-2 pb-2 border-b border-base-200">
    <div>
        <h3 class="text-base font-bold">Manage Subjects</h3>
        <p class="text-xs text-base-content/60">{{ student.full_name }}</p>
    </div>
</div>

{% if not all_subjects %}
<div class="alert alert-info py-2 text-sm">
    <i class="fa-solid fa-info-circle"></i>
    <span>No subjects added to this class yet.</span>
</div>
<div class="modal-action pt-3 mt-2">
    <form method="dialog">
        <button class="btn btn-sm">Close</button>
    </form>
</div>
{% else %}
<form method="post"
      action="{% url 'academics:class_student_electives' class.pk student.pk %}"
      hx-post="{% url 'academics:class_student_electives' class.pk student.pk %}"
      hx-target="#modal-edit-content"
      hx-swap="innerHTML">
    {% csrf_token %}

    <p class="text-xs text-base-content/60 mb-2">Uncheck to remove from gradebook.</p>

    <div class="space-y-1 max-h-60 overflow-y-auto -mx-1 px-1">
        {% for cs in all_subjects %}
        <label class="flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-base-200/50 cursor-pointer">
            <input type="checkbox"
                   name="subjects"
                   value="{{ cs.pk }}"
                   class="checkbox checkbox-primary checkbox-xs"
                   {% if cs.pk in enrolled_ids %}checked{% endif %}>
            <span class="flex-1 text-sm">{{ cs.subject.name }}</span>
            {% if cs.auto_enroll %}
            <span class="badge badge-primary badge-xs">Core</span>
            {% else %}
            <span class="badge badge-secondary badge-xs">Elective</span>
            {% endif %}
        </label>
        {% endfor %}
    </div>

    <div class="modal-action border-t border-base-200 pt-3 mt-3">
        <button type="button" class="btn btn-sm" onclick="document.getElementById('modal_edit').close()">Cancel</button>
        <button type="submit" class="btn btn-sm btn-primary">
            <i class="fa-solid fa-check"></i> Save
        </button>
    </div>
</form>
{% endif %}
