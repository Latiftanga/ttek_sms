{% load core_tags %}
<div id="assignment-row-{{ assign.pk }}" class="group flex items-center gap-2 sm:gap-3 p-2.5 sm:p-3 rounded-xl border border-base-200 hover:border-primary/20 hover:bg-base-200/30 transition-all">
    <!-- Number Badge -->
    <div class="w-7 h-7 rounded-lg bg-base-200 flex items-center justify-center shrink-0">
        <span class="text-xs font-bold text-base-content/50">{{ num }}</span>
    </div>

    <!-- Assignment Info -->
    <div class="flex-1 min-w-0">
        <div class="flex flex-wrap items-center gap-x-2 gap-y-0.5">
            <span class="font-medium text-sm">{{ assign.name }}</span>
            <span class="text-xs text-base-content/50">{{ assign.points_possible }} pts</span>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
        <button class="btn btn-ghost btn-xs btn-square min-h-[36px] min-w-[36px]"
                hx-get="{% url 'gradebook:assignment_edit' assign.pk %}"
                hx-target="#assignment-row-{{ assign.pk }}"
                hx-swap="outerHTML"
                title="Edit">
            <i class="fa-solid fa-pen text-xs text-base-content/50"></i>
        </button>
        <button class="btn btn-ghost btn-xs btn-square min-h-[36px] min-w-[36px]"
                hx-post="{% url 'gradebook:assignment_delete' assign.pk %}"
                hx-target="#assignments-container"
                hx-swap="outerHTML"
                hx-confirm="Delete {{ assign.name }}? All scores for this assignment will be lost."
                title="Delete">
            <i class="fa-solid fa-trash text-xs text-error"></i>
        </button>
    </div>
</div>
